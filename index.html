<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reggae Lang</title>
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body {
            background-color: #272727;
            font-family: "Arial Rounded MT Bold", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        header>div {
            height: 0.5rem;
            width: 100%;
        }

        #green {
            background-color: green;
        }

        #red {
            background-color: red;
        }

        #yellow {
            background-color: yellow;
        }

        header>h1 {
            margin-top: 0.5rem;
            color: #fff;
            text-align: center;
            font-weight: 500;
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            padding: 2rem;
        }

        main>section {
            display: flex;
            flex-direction: column;
        }

        main>section>h3 {
            color: #fff;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        textarea,
        button,
        main>section>div {
            background-color: #3a3a3a;
            border: 1px solid white;
            border-radius: 5px;
            color: #fff;
        }

        textarea {
            resize: none;
        }

        textarea,
        main>section>div {
            height: 35rem;
            padding: 0.5rem 0.7rem;
        }

        button {
            padding: 0.8rem 3.5rem;
            font-size: 1rem;
            align-self: flex-end;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <header>
        <div id='green'></div>
        <div id='yellow'></div>
        <div id='red'></div>

        <h1>reggae-lang</h1>
    </header>

    <main>
        <section>
            <h3>Code</h3>
            <textarea id='input'>roots bob = "Hello, Bob Marley!";
sound(bob);</textarea>
            <button id='run'>Run</button>
        </section>
        <section>
            <h3>Output</h3>
            <div id='output'></div>
        </section>
    </main>

    <script type="module" src="src/index.ts"></script>
</body>

</html>
